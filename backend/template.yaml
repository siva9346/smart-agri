AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Naveena Uzhavan – Agri Management Backend (Python)

# ─── Global defaults applied to every Lambda ─────────────────────────────────
Globals:
  Function:
    Runtime: python3.12
    Architectures: [arm64]        # Graviton2 – 20% cheaper, faster cold starts
    Timeout: 29                   # Keep under API GW 30s timeout
    MemorySize: 512
    CodeUri: src/                 # Single code package shared across all functions
    Environment:
      Variables:
        JWT_SECRET: !Ref JwtSecret
        USERS_TABLE: !Ref UsersTable
        LANDS_TABLE: !Ref LandsTable
        CROP_CYCLES_TABLE: !Ref CropCyclesTable
        DAILY_RECORDS_TABLE: !Ref DailyRecordsTable
        PRODUCTS_TABLE: !Ref ProductsTable
        ORDERS_TABLE: !Ref OrdersTable
        ADVICE_TABLE: !Ref AdviceTable
        NOTIFICATIONS_TABLE: !Ref NotificationsTable
        ENQUIRIES_TABLE: !Ref EnquiriesTable
        SYMPTOMS_TABLE: !Ref SymptomsTable
  HttpApi:
    CorsConfiguration:
      AllowOrigins: ['*']
      AllowMethods: [GET, POST, PUT, DELETE, OPTIONS]
      AllowHeaders: [Content-Type, Authorization]
      MaxAge: 600

# ─── Parameters ──────────────────────────────────────────────────────────────
Parameters:
  JwtSecret:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /naveena/jwt-secret
    Description: JWT signing secret stored in SSM Parameter Store (must be type String — SecureString is not supported here, and ssm-secure dynamic references are not supported in Lambda env vars)
  SesSenderEmail:
    Type: String
    Default: dev.sivaprasathv@gmail.com
    Description: Verified SES sender identity used to email password-reset OTPs

Resources:

  # ── API Gateway ─────────────────────────────────────────────────────────────
  Api:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: v1
      Description: Naveena Uzhavan REST API

  # ─────────────────────────────────────────────────────────────────────────────
  # LAMBDA FUNCTIONS  (Python 3.12, arm64 Graviton2)
  # boto3 is available in the Lambda runtime — not included in requirements.txt.
  # SAM installs requirements.txt from src/ during sam build.
  # ─────────────────────────────────────────────────────────────────────────────

  # ── Auth ─────────────────────────────────────────────────────────────────────
  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handlers.auth.handler
      Description: Login and token verification
      Environment:
        Variables:
          SES_SENDER_EMAIL: !Ref SesSenderEmail
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              # In SES sandbox mode, authorization is checked against both the
              # sender identity and any recipient identity verified in this
              # account, so this can't be scoped to SesSenderEmail alone.
              Resource: !Sub 'arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/*'
      Events:
        Root: { Type: HttpApi, Properties: { Path: "/auth/{proxy+}", Method: ANY, ApiId: !Ref Api } }

  # ── Farmers ──────────────────────────────────────────────────────────────────
  FarmersFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handlers.farmers.handler
      Description: Farmer (customer) CRUD – admin only for list/create/delete
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        Root: { Type: HttpApi, Properties: { Path: /farmers,         Method: ANY, ApiId: !Ref Api } }
        Sub:  { Type: HttpApi, Properties: { Path: "/farmers/{proxy+}", Method: ANY, ApiId: !Ref Api } }

  # ── Lands ─────────────────────────────────────────────────────────────────────
  LandsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handlers.lands.handler
      Description: Land parcel CRUD
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref LandsTable
      Events:
        Root: { Type: HttpApi, Properties: { Path: /lands,          Method: ANY, ApiId: !Ref Api } }
        Sub:  { Type: HttpApi, Properties: { Path: "/lands/{proxy+}",  Method: ANY, ApiId: !Ref Api } }

  # ── Crop Cycles ───────────────────────────────────────────────────────────────
  CropCyclesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handlers.crop_cycles.handler
      Description: Crop cultivation cycle management
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CropCyclesTable
      Events:
        Root: { Type: HttpApi, Properties: { Path: /crop-cycles,          Method: ANY, ApiId: !Ref Api } }
        Sub:  { Type: HttpApi, Properties: { Path: "/crop-cycles/{proxy+}",  Method: ANY, ApiId: !Ref Api } }

  # ── Daily Records ─────────────────────────────────────────────────────────────
  RecordsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handlers.records.handler
      Description: Daily farming activity records (expenses, harvests, symptoms)
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DailyRecordsTable
      Events:
        Root: { Type: HttpApi, Properties: { Path: /records,          Method: ANY, ApiId: !Ref Api } }
        Sub:  { Type: HttpApi, Properties: { Path: "/records/{proxy+}",  Method: ANY, ApiId: !Ref Api } }

  # ── Products ──────────────────────────────────────────────────────────────────
  ProductsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handlers.products.handler
      Description: Fertilizer/product catalogue
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ProductsTable
      Events:
        Root: { Type: HttpApi, Properties: { Path: /products,          Method: ANY, ApiId: !Ref Api } }
        Sub:  { Type: HttpApi, Properties: { Path: "/products/{proxy+}",  Method: ANY, ApiId: !Ref Api } }

  # ── Orders ────────────────────────────────────────────────────────────────────
  OrdersFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handlers.orders.handler
      Description: Farmer product orders
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ProductsTable   # needed for stock decrement on order create
      Events:
        Root: { Type: HttpApi, Properties: { Path: /orders,          Method: ANY, ApiId: !Ref Api } }
        Sub:  { Type: HttpApi, Properties: { Path: "/orders/{proxy+}",  Method: ANY, ApiId: !Ref Api } }

  # ── Expert Advice ─────────────────────────────────────────────────────────────
  AdviceFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handlers.advice.handler
      Description: Farmer–admin expert advice channel
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AdviceTable
      Events:
        Root: { Type: HttpApi, Properties: { Path: /advice,          Method: ANY, ApiId: !Ref Api } }
        Sub:  { Type: HttpApi, Properties: { Path: "/advice/{proxy+}",  Method: ANY, ApiId: !Ref Api } }

  # ── Notifications ─────────────────────────────────────────────────────────────
  NotificationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handlers.notifications.handler
      Description: Admin push notifications / alerts
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref NotificationsTable
      Events:
        Root: { Type: HttpApi, Properties: { Path: /notifications,          Method: ANY, ApiId: !Ref Api } }
        Sub:  { Type: HttpApi, Properties: { Path: "/notifications/{proxy+}",  Method: ANY, ApiId: !Ref Api } }

  # ── Enquiries ─────────────────────────────────────────────────────────────────
  EnquiriesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handlers.enquiries.handler
      Description: Farmer support enquiries
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EnquiriesTable
      Events:
        Root: { Type: HttpApi, Properties: { Path: /enquiries,          Method: ANY, ApiId: !Ref Api } }
        Sub:  { Type: HttpApi, Properties: { Path: "/enquiries/{proxy+}",  Method: ANY, ApiId: !Ref Api } }

  # ── Symptoms ──────────────────────────────────────────────────────────────────
  SymptomsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handlers.symptoms.handler
      Description: Crop disease / symptom reference database
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SymptomsTable
      Events:
        Root: { Type: HttpApi, Properties: { Path: /symptoms,          Method: ANY, ApiId: !Ref Api } }
        Sub:  { Type: HttpApi, Properties: { Path: "/symptoms/{proxy+}",  Method: ANY, ApiId: !Ref Api } }

  # ─────────────────────────────────────────────────────────────────────────────
  # DYNAMODB TABLES  (PAY_PER_REQUEST = on-demand, auto-scales to any load)
  # DeletionPolicy: Retain – tables survive stack deletion (data safety)
  # ─────────────────────────────────────────────────────────────────────────────

  UsersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: naveena-users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: userId, AttributeType: S }
        - { AttributeName: phone,  AttributeType: S }
      KeySchema:
        - { AttributeName: userId, KeyType: HASH }
      GlobalSecondaryIndexes:
        - IndexName: PhoneIndex
          KeySchema:
            - { AttributeName: phone, KeyType: HASH }
          Projection: { ProjectionType: ALL }

  LandsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: naveena-lands
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: landId,   AttributeType: S }
        - { AttributeName: farmerId, AttributeType: S }
      KeySchema:
        - { AttributeName: landId, KeyType: HASH }
      GlobalSecondaryIndexes:
        - IndexName: FarmerIndex
          KeySchema:
            - { AttributeName: farmerId, KeyType: HASH }
          Projection: { ProjectionType: ALL }

  CropCyclesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: naveena-crop-cycles
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: landId,  AttributeType: S }
        - { AttributeName: cycleId, AttributeType: S }
      KeySchema:
        - { AttributeName: landId,  KeyType: HASH }
        - { AttributeName: cycleId, KeyType: RANGE }
      GlobalSecondaryIndexes:
        - IndexName: CycleIdIndex
          KeySchema:
            - { AttributeName: cycleId, KeyType: HASH }
          Projection: { ProjectionType: ALL }

  DailyRecordsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: naveena-daily-records
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: cycleId,  AttributeType: S }
        - { AttributeName: sortKey,  AttributeType: S }  # date#recordId
        - { AttributeName: recordId, AttributeType: S }
      KeySchema:
        - { AttributeName: cycleId, KeyType: HASH }
        - { AttributeName: sortKey, KeyType: RANGE }
      GlobalSecondaryIndexes:
        - IndexName: RecordIdIndex
          KeySchema:
            - { AttributeName: recordId, KeyType: HASH }
          Projection: { ProjectionType: ALL }

  ProductsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: naveena-products
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: productId, AttributeType: S }
      KeySchema:
        - { AttributeName: productId, KeyType: HASH }

  OrdersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: naveena-orders
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: orderId,    AttributeType: S }
        - { AttributeName: customerId, AttributeType: S }
        - { AttributeName: createdAt,  AttributeType: S }
      KeySchema:
        - { AttributeName: orderId, KeyType: HASH }
      GlobalSecondaryIndexes:
        - IndexName: CustomerIndex
          KeySchema:
            - { AttributeName: customerId, KeyType: HASH }
            - { AttributeName: createdAt,  KeyType: RANGE }
          Projection: { ProjectionType: ALL }

  AdviceTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: naveena-advice
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: adviceId,  AttributeType: S }
        - { AttributeName: farmerId,  AttributeType: S }
        - { AttributeName: createdAt, AttributeType: S }
      KeySchema:
        - { AttributeName: adviceId, KeyType: HASH }
      GlobalSecondaryIndexes:
        - IndexName: FarmerIndex
          KeySchema:
            - { AttributeName: farmerId,  KeyType: HASH }
            - { AttributeName: createdAt, KeyType: RANGE }
          Projection: { ProjectionType: ALL }

  NotificationsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: naveena-notifications
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: notifId, AttributeType: S }
      KeySchema:
        - { AttributeName: notifId, KeyType: HASH }

  EnquiriesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: naveena-enquiries
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: enquiryId, AttributeType: S }
        - { AttributeName: farmerId,  AttributeType: S }
        - { AttributeName: createdAt, AttributeType: S }
      KeySchema:
        - { AttributeName: enquiryId, KeyType: HASH }
      GlobalSecondaryIndexes:
        - IndexName: FarmerIndex
          KeySchema:
            - { AttributeName: farmerId,  KeyType: HASH }
            - { AttributeName: createdAt, KeyType: RANGE }
          Projection: { ProjectionType: ALL }

  SymptomsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: naveena-symptoms
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: symptomId, AttributeType: S }
      KeySchema:
        - { AttributeName: symptomId, KeyType: HASH }

# ─── Outputs ─────────────────────────────────────────────────────────────────
Outputs:
  ApiUrl:
    Description: API Gateway base URL
    Value: !Sub https://${Api}.execute-api.${AWS::Region}.amazonaws.com/v1
    Export:
      Name: NaveenaApiUrl
